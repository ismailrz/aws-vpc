<svg width="920" height="580" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <text x="20" y="30" font-size="17" font-weight="bold" fill="#232F3E">AWS Network Firewall — Deployment Models</text>

  <!-- Model label row -->
  <text x="60" y="58" font-size="13" font-weight="bold" fill="#B71C1C">Model A: Distributed</text>
  <text x="520" y="58" font-size="13" font-weight="bold" fill="#1565C0">Model B: Centralized (via TGW)</text>

  <!-- ===== MODEL A: DISTRIBUTED ===== -->
  <rect x="20" y="68" width="420" height="490" rx="10" fill="#FFF3E0" stroke="#E65100" stroke-width="2"/>
  <text x="40" y="90" font-size="11" fill="#BF360C">Each VPC has its own firewall — simpler, higher cost</text>

  <!-- Internet -->
  <ellipse cx="230" cy="124" rx="90" ry="30" fill="#ECEFF1" stroke="#90A4AE" stroke-width="2"/>
  <text x="192" y="129" font-size="11" font-weight="bold" fill="#546E7A">Internet</text>

  <!-- IGW -->
  <rect x="165" y="168" width="130" height="32" rx="6" fill="#FF9800" stroke="#E65100" stroke-width="1.5"/>
  <text x="193" y="189" font-size="11" font-weight="bold" fill="white">IGW</text>

  <!-- Firewall Subnet A -->
  <rect x="90" y="218" width="280" height="60" rx="8" fill="#FFCCBC" stroke="#E64A19" stroke-width="1.5"/>
  <text x="110" y="238" font-size="10" font-weight="bold" fill="#BF360C">Firewall Subnet</text>
  <rect x="110" y="248" width="240" height="24" rx="4" fill="#E64A19"/>
  <text x="155" y="264" font-size="10" font-weight="bold" fill="white">Network Firewall Endpoint</text>

  <!-- Public Subnet A -->
  <rect x="90" y="294" width="280" height="60" rx="8" fill="#E8F5E9" stroke="#43A047" stroke-width="1.5"/>
  <text x="110" y="314" font-size="10" font-weight="bold" fill="#2E7D32">Public Subnet</text>
  <rect x="110" y="324" width="110" height="24" rx="4" fill="#43A047"/>
  <text x="128" y="340" font-size="10" font-weight="bold" fill="white">NAT Gateway</text>

  <!-- Private Subnet A -->
  <rect x="90" y="370" width="280" height="60" rx="8" fill="#E3F2FD" stroke="#1E88E5" stroke-width="1.5"/>
  <text x="110" y="390" font-size="10" font-weight="bold" fill="#1565C0">Private Subnet</text>
  <rect x="110" y="400" width="110" height="24" rx="4" fill="#1E88E5"/>
  <text x="125" y="416" font-size="10" font-weight="bold" fill="white">App Servers</text>

  <!-- Flow arrows A -->
  <line x1="230" y1="154" x2="230" y2="168" stroke="#FF9800" stroke-width="2"/>
  <polygon points="230,168 224,158 236,158" fill="#FF9800"/>
  <line x1="230" y1="200" x2="230" y2="218" stroke="#E64A19" stroke-width="2"/>
  <polygon points="230,218 224,208 236,208" fill="#E64A19"/>
  <line x1="230" y1="278" x2="230" y2="294" stroke="#43A047" stroke-width="2"/>
  <polygon points="230,294 224,284 236,284" fill="#43A047"/>
  <line x1="230" y1="354" x2="230" y2="370" stroke="#1E88E5" stroke-width="2"/>
  <polygon points="230,370 224,360 236,360" fill="#1E88E5"/>

  <!-- Route table A -->
  <rect x="90" y="446" width="280" height="100" rx="6" fill="white" stroke="#E64A19" stroke-width="1"/>
  <text x="106" y="464" font-size="10" font-weight="bold" fill="#BF360C">Route Table (Public Subnet)</text>
  <line x1="90" y1="468" x2="370" y2="468" stroke="#FFCCBC" stroke-width="0.8"/>
  <text x="100" y="482" font-size="9" fill="#333">Destination    Target</text>
  <line x1="90" y1="486" x2="370" y2="486" stroke="#ddd" stroke-width="0.5"/>
  <text x="100" y="500" font-size="9" fill="#333">10.0.0.0/16    local</text>
  <text x="100" y="514" font-size="9" fill="#E64A19">0.0.0.0/0      vpce-firewall (Firewall Endpoint)</text>
  <text x="100" y="528" font-size="9" fill="#888">← all egress inspected before IGW</text>

  <!-- ===== MODEL B: CENTRALIZED ===== -->
  <rect x="460" y="68" width="440" height="490" rx="10" fill="#E3F2FD" stroke="#1565C0" stroke-width="2"/>
  <text x="480" y="90" font-size="11" fill="#0D47A1">One shared firewall VPC — scales, lower cost per spoke</text>

  <!-- Internet -->
  <ellipse cx="680" cy="124" rx="90" ry="30" fill="#ECEFF1" stroke="#90A4AE" stroke-width="2"/>
  <text x="644" y="129" font-size="11" font-weight="bold" fill="#546E7A">Internet</text>

  <!-- Firewall VPC -->
  <rect x="520" y="160" width="320" height="156" rx="8" fill="#BBDEFB" stroke="#1E88E5" stroke-width="2"/>
  <text x="538" y="178" font-size="11" font-weight="bold" fill="#1565C0">Firewall VPC</text>

  <!-- IGW in FW VPC -->
  <rect x="615" y="186" width="110" height="28" rx="5" fill="#FF9800" stroke="#E65100" stroke-width="1.5"/>
  <text x="638" y="204" font-size="10" font-weight="bold" fill="white">IGW</text>

  <!-- Network Firewall in FW VPC -->
  <rect x="538" y="224" width="284" height="36" rx="6" fill="#E64A19"/>
  <text x="578" y="247" font-size="11" font-weight="bold" fill="white">AWS Network Firewall</text>

  <!-- TGW attachment -->
  <rect x="538" y="272" width="284" height="36" rx="6" fill="#1E88E5"/>
  <text x="578" y="294" font-size="11" font-weight="bold" fill="white">TGW Attachment</text>

  <!-- TGW -->
  <rect x="600" y="334" width="160" height="40" rx="8" fill="#FF9800" stroke="#E65100" stroke-width="2.5"/>
  <text x="624" y="360" font-size="12" font-weight="bold" fill="white">Transit Gateway</text>

  <!-- Spoke VPCs -->
  <rect x="480" y="400" width="140" height="60" rx="8" fill="#E8F5E9" stroke="#43A047" stroke-width="1.5"/>
  <text x="506" y="420" font-size="10" font-weight="bold" fill="#2E7D32">Spoke VPC-A</text>
  <text x="492" y="438" font-size="9" fill="#388E3C">10.0.0.0/16</text>
  <text x="492" y="452" font-size="9" fill="#388E3C">App workloads</text>

  <rect x="640" y="400" width="140" height="60" rx="8" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="1.5"/>
  <text x="666" y="420" font-size="10" font-weight="bold" fill="#6A1B9A">Spoke VPC-B</text>
  <text x="652" y="438" font-size="9" fill="#7B1FA2">10.1.0.0/16</text>
  <text x="652" y="452" font-size="9" fill="#7B1FA2">Dev workloads</text>

  <rect x="560" y="476" width="140" height="60" rx="8" fill="#FCE4EC" stroke="#E53935" stroke-width="1.5"/>
  <text x="576" y="496" font-size="10" font-weight="bold" fill="#B71C1C">Spoke VPC-C</text>
  <text x="568" y="514" font-size="9" fill="#C62828">10.2.0.0/16</text>
  <text x="568" y="528" font-size="9" fill="#C62828">DB / Data</text>

  <!-- Arrows centralized -->
  <line x1="680" y1="154" x2="680" y2="186" stroke="#FF9800" stroke-width="2"/>
  <polygon points="680,186 674,176 686,176" fill="#FF9800"/>
  <line x1="680" y1="316" x2="680" y2="334" stroke="#1E88E5" stroke-width="2"/>
  <polygon points="680,334 674,324 686,324" fill="#1E88E5"/>
  <line x1="640" y1="374" x2="570" y2="400" stroke="#43A047" stroke-width="2"/>
  <polygon points="570,400 574,388 562,392" fill="#43A047"/>
  <line x1="700" y1="374" x2="720" y2="400" stroke="#7B1FA2" stroke-width="2"/>
  <polygon points="720,400 712,390 724,390" fill="#7B1FA2"/>
  <line x1="660" y1="374" x2="640" y2="476" stroke="#E53935" stroke-width="2"/>
  <polygon points="640,476 636,464 648,466" fill="#E53935"/>
</svg>
