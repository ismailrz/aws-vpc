<svg width="920" height="640" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <text x="20" y="30" font-size="17" font-weight="bold" fill="#232F3E">High Availability — 3-Tier Multi-AZ Production Architecture</text>

  <!-- Internet -->
  <ellipse cx="460" cy="66" rx="160" ry="40" fill="#ECEFF1" stroke="#90A4AE" stroke-width="2"/>
  <text x="388" y="62" font-size="13" font-weight="bold" fill="#546E7A">&#x1F310; Internet</text>
  <text x="410" y="80" font-size="10" fill="#78909C">Users worldwide</text>

  <!-- IGW -->
  <rect x="335" y="122" width="250" height="40" rx="8" fill="#FF9800" stroke="#E65100" stroke-width="2"/>
  <text x="380" y="138" font-size="12" font-weight="bold" fill="white">Internet Gateway</text>
  <text x="390" y="152" font-size="10" fill="#FFF8E1">Scales horizontally, HA by default</text>

  <!-- Arrows Internet ↔ IGW -->
  <line x1="460" y1="106" x2="460" y2="122" stroke="#FF9800" stroke-width="2.5"/>
  <polygon points="460,122 454,112 466,112" fill="#FF9800"/>

  <!-- VPC outer -->
  <rect x="18" y="178" width="884" height="448" rx="12" fill="#E3F2FD" stroke="#1E88E5" stroke-width="2"/>
  <text x="36" y="200" font-size="13" font-weight="bold" fill="#1565C0">VPC: 10.0.0.0/16</text>

  <!-- ALB spanning both AZs -->
  <rect x="280" y="208" width="360" height="44" rx="8" fill="#7B1FA2" stroke="#4A148C" stroke-width="2"/>
  <text x="352" y="228" font-size="12" font-weight="bold" fill="white">Application Load Balancer</text>
  <text x="336" y="244" font-size="10" fill="#E1BEE7">Cross-AZ  |  sg-alb: 443 from 0.0.0.0/0  |  Sticky sessions</text>

  <!-- Arrow IGW → ALB -->
  <line x1="460" y1="162" x2="460" y2="208" stroke="#7B1FA2" stroke-width="2.5"/>
  <polygon points="460,208 454,197 466,197" fill="#7B1FA2"/>

  <!-- AZ-A Column -->
  <rect x="36" y="268" width="400" height="344" rx="10" fill="white" stroke="#B0BEC5" stroke-width="1.5" stroke-dasharray="7,4"/>
  <text x="54" y="288" font-size="12" font-weight="bold" fill="#607D8B">AZ: us-east-1a</text>

  <!-- AZ-B Column -->
  <rect x="484" y="268" width="400" height="344" rx="10" fill="white" stroke="#B0BEC5" stroke-width="1.5" stroke-dasharray="7,4"/>
  <text x="502" y="288" font-size="12" font-weight="bold" fill="#607D8B">AZ: us-east-1b</text>

  <!-- PUBLIC SUBNET A -->
  <rect x="54" y="300" width="364" height="90" rx="8" fill="#E8F5E9" stroke="#43A047" stroke-width="1.5"/>
  <text x="70" y="318" font-size="11" font-weight="bold" fill="#2E7D32">Public Subnet  10.0.1.0/24</text>
  <!-- NAT GW A -->
  <rect x="70" y="326" width="152" height="52" rx="5" fill="#43A047"/>
  <text x="98" y="348" font-size="11" font-weight="bold" fill="white">NAT Gateway A</text>
  <text x="82" y="365" font-size="10" fill="#C8E6C9">EIP: 52.x.x.x</text>
  <!-- Bastion A -->
  <rect x="240" y="326" width="162" height="52" rx="5" fill="#66BB6A"/>
  <text x="278" y="348" font-size="11" font-weight="bold" fill="white">Bastion</text>
  <text x="258" y="365" font-size="10" fill="#C8E6C9">or SSM Session Mgr</text>

  <!-- PUBLIC SUBNET B -->
  <rect x="502" y="300" width="364" height="90" rx="8" fill="#E8F5E9" stroke="#43A047" stroke-width="1.5"/>
  <text x="518" y="318" font-size="11" font-weight="bold" fill="#2E7D32">Public Subnet  10.0.2.0/24</text>
  <rect x="518" y="326" width="152" height="52" rx="5" fill="#43A047"/>
  <text x="546" y="348" font-size="11" font-weight="bold" fill="white">NAT Gateway B</text>
  <text x="530" y="365" font-size="10" fill="#C8E6C9">EIP: 54.x.x.x</text>
  <rect x="688" y="326" width="162" height="52" rx="5" fill="#66BB6A"/>
  <text x="726" y="348" font-size="11" font-weight="bold" fill="white">Bastion</text>
  <text x="706" y="365" font-size="10" fill="#C8E6C9">or SSM Session Mgr</text>

  <!-- PRIVATE SUBNET A -->
  <rect x="54" y="410" width="364" height="90" rx="8" fill="#E3F2FD" stroke="#1E88E5" stroke-width="1.5"/>
  <text x="70" y="428" font-size="11" font-weight="bold" fill="#1565C0">Private Subnet  10.0.11.0/24</text>
  <text x="70" y="443" font-size="9" fill="#1976D2">RT: 0.0.0.0/0 → NAT GW-A</text>
  <rect x="70" y="450" width="152" height="42" rx="5" fill="#1E88E5"/>
  <text x="100" y="470" font-size="11" font-weight="bold" fill="white">App Server</text>
  <text x="82" y="484" font-size="9" fill="#BBDEFB">sg-app: 8080 ← ALB</text>
  <rect x="240" y="450" width="162" height="42" rx="5" fill="#42A5F5"/>
  <text x="268" y="470" font-size="11" font-weight="bold" fill="white">App Server</text>
  <text x="250" y="484" font-size="9" fill="#BBDEFB">Auto Scaling Group</text>

  <!-- PRIVATE SUBNET B -->
  <rect x="502" y="410" width="364" height="90" rx="8" fill="#E3F2FD" stroke="#1E88E5" stroke-width="1.5"/>
  <text x="518" y="428" font-size="11" font-weight="bold" fill="#1565C0">Private Subnet  10.0.12.0/24</text>
  <text x="518" y="443" font-size="9" fill="#1976D2">RT: 0.0.0.0/0 → NAT GW-B</text>
  <rect x="518" y="450" width="152" height="42" rx="5" fill="#1E88E5"/>
  <text x="548" y="470" font-size="11" font-weight="bold" fill="white">App Server</text>
  <text x="530" y="484" font-size="9" fill="#BBDEFB">sg-app: 8080 ← ALB</text>
  <rect x="688" y="450" width="162" height="42" rx="5" fill="#42A5F5"/>
  <text x="716" y="470" font-size="11" font-weight="bold" fill="white">App Server</text>
  <text x="698" y="484" font-size="9" fill="#BBDEFB">Auto Scaling Group</text>

  <!-- ISOLATED SUBNET A -->
  <rect x="54" y="520" width="364" height="80" rx="8" fill="#FCE4EC" stroke="#E53935" stroke-width="1.5"/>
  <text x="70" y="538" font-size="11" font-weight="bold" fill="#B71C1C">Isolated Subnet  10.0.21.0/24</text>
  <text x="70" y="552" font-size="9" fill="#C62828">RT: local route only</text>
  <rect x="70" y="556" width="152" height="36" rx="5" fill="#E53935"/>
  <text x="98" y="574" font-size="11" font-weight="bold" fill="white">RDS Primary</text>
  <text x="82" y="586" font-size="9" fill="#FFCDD2">sg-db: 5432 ← App SG</text>
  <rect x="240" y="556" width="162" height="36" rx="5" fill="#EF5350"/>
  <text x="268" y="574" font-size="11" font-weight="bold" fill="white">ElastiCache</text>
  <text x="252" y="586" font-size="9" fill="#FFCDD2">Redis Primary</text>

  <!-- ISOLATED SUBNET B -->
  <rect x="502" y="520" width="364" height="80" rx="8" fill="#FCE4EC" stroke="#E53935" stroke-width="1.5"/>
  <text x="518" y="538" font-size="11" font-weight="bold" fill="#B71C1C">Isolated Subnet  10.0.22.0/24</text>
  <text x="518" y="552" font-size="9" fill="#C62828">RT: local route only</text>
  <rect x="518" y="556" width="152" height="36" rx="5" fill="#E53935"/>
  <text x="540" y="574" font-size="11" font-weight="bold" fill="white">RDS Standby</text>
  <text x="524" y="586" font-size="9" fill="#FFCDD2">Multi-AZ sync replica</text>
  <rect x="688" y="556" width="162" height="36" rx="5" fill="#EF5350"/>
  <text x="716" y="574" font-size="11" font-weight="bold" fill="white">ElastiCache</text>
  <text x="700" y="586" font-size="9" fill="#FFCDD2">Redis Replica</text>

  <!-- Vertical flow arrows AZ-A -->
  <line x1="236" y1="252" x2="180" y2="300" stroke="#7B1FA2" stroke-width="2" stroke-dasharray="5,3"/>
  <line x1="146" y1="378" x2="146" y2="410" stroke="#43A047" stroke-width="2"/>
  <polygon points="146,410 140,399 152,399" fill="#43A047"/>
  <line x1="146" y1="492" x2="146" y2="520" stroke="#1E88E5" stroke-width="2"/>
  <polygon points="146,520 140,509 152,509" fill="#1E88E5"/>

  <!-- Vertical flow arrows AZ-B -->
  <line x1="684" y1="252" x2="756" y2="300" stroke="#7B1FA2" stroke-width="2" stroke-dasharray="5,3"/>
  <line x1="594" y1="378" x2="594" y2="410" stroke="#43A047" stroke-width="2"/>
  <polygon points="594,410 588,399 600,399" fill="#43A047"/>
  <line x1="594" y1="492" x2="594" y2="520" stroke="#1E88E5" stroke-width="2"/>
  <polygon points="594,520 588,509 600,509" fill="#1E88E5"/>

  <!-- RDS sync arrow -->
  <line x1="222" y1="574" x2="518" y2="574" stroke="#C62828" stroke-width="1.5" stroke-dasharray="6,4"/>
  <polygon points="518,574 506,568 506,580" fill="#C62828"/>
  <text x="310" y="568" font-size="9" fill="#C62828">sync replication</text>

  <!-- Bottom summary bar -->
  <rect x="18" y="632" width="884" height="0" fill="none"/>
</svg>
