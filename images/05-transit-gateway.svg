<svg width="880" height="580" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <text x="20" y="30" font-size="17" font-weight="bold" fill="#232F3E">AWS Transit Gateway — Hub-and-Spoke Architecture</text>

  <!-- TGW Hub -->
  <rect x="310" y="220" width="260" height="100" rx="12" fill="#FF9800" stroke="#E65100" stroke-width="3"/>
  <text x="352" y="260" font-size="14" font-weight="bold" fill="white">Transit Gateway</text>
  <text x="338" y="280" font-size="11" fill="#FFF8E1">Regional Hub — tgw-xxxxxxxx</text>
  <text x="338" y="296" font-size="10" fill="#FFE0B2">Multi-VPC  |  VPN  |  Direct Connect</text>
  <text x="338" y="310" font-size="10" fill="#FFE0B2">Max 5,000 attachments  |  50 Gbps/VPC</text>

  <!-- VPC-A -->
  <rect x="30" y="60" width="190" height="120" rx="10" fill="#E8F5E9" stroke="#43A047" stroke-width="2"/>
  <text x="78" y="84" font-size="13" font-weight="bold" fill="#2E7D32">VPC-A</text>
  <text x="62" y="100" font-size="11" fill="#388E3C">10.0.0.0/16</text>
  <text x="46" y="116" font-size="10" fill="#555">Production App</text>
  <rect x="46" y="126" width="158" height="42" rx="5" fill="#43A047"/>
  <text x="84" y="148" font-size="10" font-weight="bold" fill="white">EC2 / EKS</text>
  <text x="68" y="162" font-size="9" fill="#C8E6C9">sg-prod-app</text>

  <!-- VPC-B -->
  <rect x="345" y="60" width="190" height="120" rx="10" fill="#E3F2FD" stroke="#1E88E5" stroke-width="2"/>
  <text x="393" y="84" font-size="13" font-weight="bold" fill="#1565C0">VPC-B</text>
  <text x="377" y="100" font-size="11" fill="#1976D2">10.1.0.0/16</text>
  <text x="361" y="116" font-size="10" fill="#555">Shared Services</text>
  <rect x="361" y="126" width="158" height="42" rx="5" fill="#1E88E5"/>
  <text x="392" y="148" font-size="10" font-weight="bold" fill="white">DNS / NTP</text>
  <text x="376" y="162" font-size="9" fill="#BBDEFB">monitoring</text>

  <!-- VPC-C -->
  <rect x="660" y="60" width="190" height="120" rx="10" fill="#FCE4EC" stroke="#E53935" stroke-width="2"/>
  <text x="706" y="84" font-size="13" font-weight="bold" fill="#B71C1C">VPC-C</text>
  <text x="692" y="100" font-size="11" fill="#C62828">10.2.0.0/16</text>
  <text x="676" y="116" font-size="10" fill="#555">Development</text>
  <rect x="676" y="126" width="158" height="42" rx="5" fill="#E53935"/>
  <text x="710" y="148" font-size="10" font-weight="bold" fill="white">Dev Servers</text>
  <text x="694" y="162" font-size="9" fill="#FFCDD2">sg-dev</text>

  <!-- VPN On-prem -->
  <rect x="30" y="390" width="190" height="120" rx="10" fill="#F3E5F5" stroke="#8E24AA" stroke-width="2"/>
  <text x="74" y="414" font-size="13" font-weight="bold" fill="#6A1B9A">On-Prem DC</text>
  <text x="50" y="430" font-size="11" fill="#7B1FA2">192.168.0.0/16</text>
  <text x="46" y="446" font-size="10" fill="#555">Site-to-Site VPN</text>
  <rect x="46" y="456" width="158" height="42" rx="5" fill="#8E24AA"/>
  <text x="62" y="476" font-size="10" font-weight="bold" fill="white">Customer GW</text>
  <text x="62" y="490" font-size="9" fill="#E1BEE7">IPsec tunnels x2</text>

  <!-- Direct Connect -->
  <rect x="660" y="390" width="190" height="120" rx="10" fill="#E8EAF6" stroke="#3F51B5" stroke-width="2"/>
  <text x="682" y="414" font-size="13" font-weight="bold" fill="#283593">Direct Connect</text>
  <text x="676" y="430" font-size="11" fill="#3949AB">Corp DC</text>
  <text x="676" y="446" font-size="10" fill="#555">172.16.0.0/12</text>
  <rect x="676" y="456" width="158" height="42" rx="5" fill="#3F51B5"/>
  <text x="698" y="476" font-size="10" font-weight="bold" fill="white">Transit VIF</text>
  <text x="692" y="490" font-size="9" fill="#C5CAE9">1G / 10G / 100G</text>

  <!-- VPC-D (another account) -->
  <rect x="345" y="390" width="190" height="120" rx="10" fill="#E0F7FA" stroke="#00ACC1" stroke-width="2"/>
  <text x="383" y="414" font-size="13" font-weight="bold" fill="#006064">VPC-D</text>
  <text x="367" y="430" font-size="11" fill="#00838F">10.3.0.0/16</text>
  <text x="361" y="446" font-size="10" fill="#555">Security (CIEM)</text>
  <rect x="361" y="456" width="158" height="42" rx="5" fill="#00ACC1"/>
  <text x="392" y="476" font-size="10" font-weight="bold" fill="white">SIEM / WAF</text>
  <text x="376" y="490" font-size="9" fill="#B2EBF2">RAM shared</text>

  <!-- Attachment lines to TGW -->
  <!-- VPC-A to TGW -->
  <line x1="180" y1="180" x2="340" y2="255" stroke="#43A047" stroke-width="2.5"/>
  <polygon points="340,255 330,248 334,260" fill="#43A047"/>
  <rect x="190" y="203" width="100" height="18" rx="4" fill="#43A047"/>
  <text x="198" y="215" font-size="9" font-weight="bold" fill="white">VPC attachment</text>

  <!-- VPC-B to TGW (straight up) -->
  <line x1="440" y1="180" x2="440" y2="220" stroke="#1E88E5" stroke-width="2.5"/>
  <polygon points="440,220 434,209 446,209" fill="#1E88E5"/>
  <rect x="444" y="192" width="100" height="18" rx="4" fill="#1E88E5"/>
  <text x="452" y="204" font-size="9" font-weight="bold" fill="white">VPC attachment</text>

  <!-- VPC-C to TGW -->
  <line x1="700" y1="180" x2="570" y2="255" stroke="#E53935" stroke-width="2.5"/>
  <polygon points="570,255 574,243 562,248" fill="#E53935"/>
  <rect x="590" y="203" width="100" height="18" rx="4" fill="#E53935"/>
  <text x="598" y="215" font-size="9" font-weight="bold" fill="white">VPC attachment</text>

  <!-- On-prem VPN to TGW -->
  <line x1="180" y1="440" x2="340" y2="295" stroke="#8E24AA" stroke-width="2.5"/>
  <polygon points="340,295 332,305 342,308" fill="#8E24AA"/>
  <rect x="186" y="348" width="100" height="18" rx="4" fill="#8E24AA"/>
  <text x="192" y="360" font-size="9" font-weight="bold" fill="white">VPN attachment</text>

  <!-- VPC-D to TGW -->
  <line x1="440" y1="390" x2="440" y2="320" stroke="#00ACC1" stroke-width="2.5"/>
  <polygon points="440,320 434,331 446,331" fill="#00ACC1"/>
  <rect x="444" y="348" width="100" height="18" rx="4" fill="#00ACC1"/>
  <text x="452" y="360" font-size="9" font-weight="bold" fill="white">VPC attachment</text>

  <!-- Direct Connect to TGW -->
  <line x1="700" y1="440" x2="570" y2="320" stroke="#3F51B5" stroke-width="2.5"/>
  <polygon points="570,320 566,332 578,326" fill="#3F51B5"/>
  <rect x="590" y="360" width="100" height="18" rx="4" fill="#3F51B5"/>
  <text x="596" y="372" font-size="9" font-weight="bold" fill="white">DX attachment</text>

  <!-- TGW Route Table legend -->
  <rect x="30" y="530" width="820" height="42" rx="6" fill="#FFFDE7" stroke="#FBC02D" stroke-width="1.5"/>
  <text x="50" y="548" font-size="11" font-weight="bold" fill="#F57F17">TGW Route Tables:</text>
  <text x="200" y="548" font-size="10" fill="#555">"Prod" RT: VPC-A, VPC-B, On-prem, DX   |</text>
  <text x="530" y="548" font-size="10" fill="#555">"Dev" RT: VPC-C only (isolated from Prod)</text>
  <text x="50" y="563" font-size="10" fill="#666">Each attachment associates to one RT and can propagate its CIDR into any RT — enabling fine-grained segmentation.</text>
</svg>
